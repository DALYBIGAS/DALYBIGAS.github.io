<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daly 的个人网站 | AI Infra & Accelerator Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --gradient-primary: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --card-bg: rgba(30, 41, 59, 0.5);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08), transparent 25%);
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 3rem 0;
            animation: fadeIn 1s ease-out forwards;
        }

        /* 顶部欢迎语 */
        .greeting {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            letter-spacing: -0.05rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 玻璃拟物卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
        }

        /* 技能标签 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 1.5rem 0 2.5rem 0;
        }

        .tag {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-glow);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-family: 'Fira Code', monospace;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        /* 特别强调的 GAMMA 项目 */
        .project-highlight {
            background: linear-gradient(to right, rgba(56, 189, 248, 0.05), rgba(129, 140, 248, 0.05));
            border-left: 4px solid var(--accent-glow);
            padding: 1.5rem;
            border-radius: 0 12px 12px 0;
            margin-top: 2rem;
        }

        .project-highlight p {
            margin-bottom: 0;
            color: var(--text-main);
        }

        .gamma-text {
            font-family: 'Fira Code', monospace;
            font-weight: 800;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .greeting { font-size: 2rem; }
            .glass-card { padding: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="greeting">大家好，这里是 Daly 的个人网站。</h1>

        <div class="glass-card">
            <h2>🧑‍💻 关于我 (About Me)</h2>
            <p>你好！我的主要研究方向是 <strong>AI 基础设施 (AI Infra)</strong> 与 <strong>硬件加速器设计 (Accelerator Design)</strong>。</p>
            <p>我致力于探索人工智能模型在底层硬件上的高效执行，专注于：</p>
            
            <div class="tags">
                <span class="tag">软硬件协同设计 (Co-design)</span>
                <span class="tag">AI 编译器优化</span>
                <span class="tag">系统级架构仿真</span>
            </div>

            <div class="project-highlight">
                <p>在我的 GitHub 主页中，你可以重点关注我设计开发的端到端系统级评估平台 —— <span class="gamma-text">GAMMA</span> 🚀</p>
            </div>
        </div>
    </div>

</body>
</html>
