<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daly is Here</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-glow: #38bdf8;
            --accent-purple: #818cf8;
            --gradient-primary: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
            --card-bg: rgba(17, 24, 39, 0.6);
            --card-border: rgba(255, 255, 255, 0.06);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 防止 canvas 滚动条 */
            position: relative;
        }

        /* 1. 背景 Canvas 特效 */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* 确保在所有内容之下 */
        }

        /* 鼠标追踪光晕（保留并优化，使其更柔和） */
        #cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(56, 189, 248, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: opacity 0.3s ease;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding: 3rem 0;
            z-index: 1; /* 确保在 canvas 和光晕之上 */
            /* 删除了 perspective，因为不需要 3D 效果了 */
        }

        /* 顶部打字机欢迎语 */
        .greeting-container {
            height: 60px;
            margin-bottom: 2rem;
            text-align: center; /* 居中显示 */
        }

        .greeting {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* 打字机光标 */
        .cursor {
            display: inline-block;
            width: 3px;
            height: 2.5rem;
            background-color: var(--accent-glow);
            vertical-align: text-bottom;
            margin-left: 5px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* 玻璃拟物卡片 */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            /* 删除了 transform-style, will-change 以及 hover 时的 transform 晃动 */
            transition: box-shadow 0.3s ease, border 0.3s ease;
        }

        .glass-card:hover {
            box-shadow: 0 35px 60px -10px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #fff;
            /* 删除了 translateZ */
        }

        p {
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            font-size: 1.1rem;
            /* 删除了 translateZ */
        }

        p strong {
            color: var(--text-main);
            font-weight: 600;
        }

        /* 技能标签 */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 2rem 0 3rem 0;
            /* 删除了 translateZ */
        }

        .tag {
            background: rgba(56, 189, 248, 0.03);
            color: var(--accent-glow);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-family: 'Fira Code', monospace;
            border: 1px solid rgba(56, 189, 248, 0.15);
            transition: all 0.3s ease;
            cursor: default;
        }

        .tag:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.4);
            transform: translateY(-2px);
        }

        /* GAMMA 项目高亮板块 */
        .project-highlight {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.03) 0%, rgba(129, 140, 248, 0.03) 100%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 2rem;
            border-radius: 16px;
            margin-top: 2rem;
            /* 删除了 translateZ */
        }

        .project-highlight p {
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        .gamma-text {
            font-family: 'Fira Code', monospace;
            font-weight: 800;
            font-size: 1.25rem;
            color: #fff;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.7);
        }

        /* 3. GAMMA 链接按钮容器 */
        .gamma-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap; /* 移动端自动换行 */
        }

        /* 通用按钮样式 */
        .btn-gamma {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-family: 'Fira Code', monospace;
            font-size: 0.95rem;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* v1 按钮样式（深色高雅） */
        .btn-v1 {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .btn-v1:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        /* v2 按钮样式（主色调渐变，更抢眼） */
        .btn-v2 {
            background: var(--gradient-primary);
            border: 1px solid transparent;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }

        .btn-v2:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }

        /* 按钮扫光特效 */
        .btn-gamma::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.6s ease;
        }

        .btn-gamma:hover::before {
            left: 100%;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .greeting-container { height: 80px; }
            .greeting { font-size: 1.8rem; }
            .glass-card { padding: 2rem; }
            .project-highlight { padding: 1.5rem; }
            .gamma-buttons { flex-direction: column; gap: 10px; }
            .btn-gamma { width: 100%; justify-content: center; }
            #cursor-glow { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="cursor-glow"></div>

    <div class="container">
        <div class="greeting-container">
            <h1 class="greeting" id="typing-text"></h1><span class="cursor"></span>
        </div>

        <div class="glass-card" id="tilt-card">
            <h2>🧑‍💻 关于我 (About Me)</h2>
            <p>你好！我的主要研究方向是 <strong>AI Infra</strong> 与 <strong>Accelerator Design</strong>。</p>
            <p>我致力于探索人工智能模型在底层硬件上的高效执行，专注于：</p>
            
            <div class="tags">
                <span class="tag">软硬件协同设计 (Co-design)</span>
                <span class="tag">AI 编译器优化</span>
                <span class="tag">系统级架构仿真</span>
            </div>

            <div class="project-highlight">
                <p>在我的 GitHub 主页中，你可以重点关注我设计开发的端到端系统级评估平台 —— <span class="gamma-text">GAMMA</span> 🚀</p>
                
                <div class="gamma-buttons">
                    <a href="https://github.com/DALYBIGAS/GAMMA-v1" target="_blank" rel="noopener noreferrer" class="btn-gamma btn-v1">

                        Explore GAMMA v1
                    </a>
                    <a href="https://github.com/DALYBIGAS/GAMMA-v2" target="_blank" rel="noopener noreferrer" class="btn-gamma btn-v2">
                        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                        Try GAMMA v2 (Latest)
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 背景粒子特效
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        // 粒子配置
        const particleConfig = {
            particleColor: 'rgba(56, 189, 248, 0.15)', // 极淡的蓝色
            linkColor: 'rgba(56, 189, 248, 0.05)',   // 更淡的连接线
            particleAmount: 60,                        // 粒子数量
            defaultRadius: 1.5,
            variantRadius: 1,
            defaultSpeed: 0.1,                         // 移动速度，非常缓慢
            variantSpeed: 0.2,
            linkRadius: 150,                           // 连接距离
        };

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.speed = particleConfig.defaultSpeed + Math.random() * particleConfig.variantSpeed;
                this.directionAngle = Math.floor(Math.random() * 360);
                this.color = particleConfig.particleColor;
                this.radius = particleConfig.defaultRadius + Math.random() * particleConfig.variantRadius;
                this.vector = {
                    x: Math.cos(this.directionAngle) * this.speed,
                    y: Math.sin(this.directionAngle) * this.speed
                };
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.closePath();
            }
            update() {
                this.border();
                this.x += this.vector.x;
                this.y += this.vector.y;
            }
            border() {
                if (this.x >= width || this.x <= 0) this.vector.x *= -1;
                if (this.y >= height || this.y <= 0) this.vector.y *= -1;
                if (this.x > width) this.x = width;
                if (this.y > height) this.y = height;
                if (this.x < 0) this.x = 0;
                if (this.y < 0) this.y = 0;
            }
        }

        function drawLines(p, arr) {
            for (let i = 0; i < arr.length; i++) {
                let distance = Math.sqrt(Math.pow(p.x - arr[i].x, 2) + Math.pow(p.y - arr[i].y, 2));
                if (distance < particleConfig.linkRadius) {
                    let opacity = 1 - distance / particleConfig.linkRadius;
                    ctx.lineWidth = 0.5;
                    ctx.strokeStyle = `rgba(56, 189, 248, ${opacity * 0.1})`; // 动态透明度连接线
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(arr[i].x, arr[i].y);
                    ctx.stroke();
                    ctx.closePath();
                }
            }
        }

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // 移动端减少粒子数量
            particleConfig.particleAmount = width < 600 ? 30 : 60;
            initParticles();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleConfig.particleAmount; i++) {
                particles.push(new Particle());
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                drawLines(particles[i], particles);
            }
            requestAnimationFrame(animateCanvas);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        animateCanvas();


        // 2. 打字机特效
        const textToType = "大家好，这里是 Daly 的个人网站。";
        const typingElement = document.getElementById('typing-text');
        let typeIndex = 0;

        function typeWriter() {
            if (typeIndex < textToType.length) {
                typingElement.textContent += textToType.charAt(typeIndex);
                typeIndex++;
                setTimeout(typeWriter, 100); 
            }
        }
        
        setTimeout(typeWriter, 500);

        // 3. 鼠标光晕追踪
        const cursorGlow = document.getElementById('cursor-glow');
        
        document.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                cursorGlow.style.left = e.clientX + 'px';
                cursorGlow.style.top = e.clientY + 'px';
            });
        });

        // 4. 3D 卡片倾斜特效 (已按要求删除)
    </script>
</body>
</html>
